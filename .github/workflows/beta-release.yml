name: Beta Release

on:
  push:
    branches:
      - beta
  workflow_dispatch:

jobs:
  create-beta-release:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    outputs:
      app_version: ${{ steps.meta.outputs.app_version }}
      beta_stamp: ${{ steps.meta.outputs.beta_stamp }}
      beta_tag: ${{ steps.meta.outputs.beta_tag }}
      release_id: ${{ steps.release.outputs.release_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute beta release metadata
        id: meta
        shell: bash
        run: |
          APP_VERSION="$(node -p "require('./package.json').version")"
          BETA_STAMP="$(date -u +%Y%m%d-%H%M%S)"
          BETA_TAG="v${APP_VERSION}-${BETA_STAMP}"

          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "beta_stamp=$BETA_STAMP" >> "$GITHUB_OUTPUT"
          echo "beta_tag=$BETA_TAG" >> "$GITHUB_OUTPUT"

      - name: Create beta prerelease with notes
        id: release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs')
            const owner = context.repo.owner
            const repo = context.repo.repo
            const tag = '${{ steps.meta.outputs.beta_tag }}'
            const version = '${{ steps.meta.outputs.app_version }}'
            const stamp = '${{ steps.meta.outputs.beta_stamp }}'
            const shortSha = context.sha.slice(0, 7)
            const publishedAt = new Date().toISOString().replace('T', ' ').replace(/\.\d{3}Z$/, ' UTC')
            const notesPath = 'RELEASE_NOTES_3.0.0-beta.md'

            let notes = ''
            try {
              notes = fs.readFileSync(notesPath, 'utf8').trim()
            } catch (error) {
              core.setFailed(`Unable to read ${notesPath}: ${error.message}`)
              return
            }

            const body = [
              notes,
              '',
              '---',
              '',
              '## Build Info',
              '',
              `- Channel: beta`,
              `- Commit: \`${shortSha}\``,
              `- Built: ${publishedAt}`,
              `- Branch: \`${context.ref.replace('refs/heads/', '')}\``,
              `- Beta tag: \`${tag}\``,
            ].join('\n')

            const release = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              target_commitish: context.sha,
              name: `${tag}`,
              body,
              draft: false,
              prerelease: true,
            })

            core.setOutput('release_id', String(release.data.id))

  publish-tauri:
    needs: create-beta-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Rewrite app version for Windows MSI packaging
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          msi_version = "3.0.0-1"

          package_path = Path("package.json")
          package_data = json.loads(package_path.read_text())
          package_data["version"] = msi_version
          package_path.write_text(json.dumps(package_data, indent=2) + "\n")

          tauri_path = Path("src-tauri/tauri.conf.json")
          tauri_data = json.loads(tauri_path.read_text())
          tauri_data["version"] = msi_version
          tauri_path.write_text(json.dumps(tauri_data, indent=2) + "\n")

          cargo_path = Path("src-tauri/Cargo.toml")
          cargo_text = cargo_path.read_text()
          cargo_text = cargo_text.replace('version = "3.0.0-beta"', f'version = "{msi_version}"', 1)
          cargo_path.write_text(cargo_text)
          PY

      - name: Lint
        run: npm run lint

      - name: Build and publish beta release artifacts
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-beta-release.outputs.release_id }}
          tagName: ${{ needs.create-beta-release.outputs.beta_tag }}
          assetNamePattern: 'Android-Toolkit_${{ needs.create-beta-release.outputs.app_version }}_[arch][_setup][ext]'
          args: ${{ matrix.args }}

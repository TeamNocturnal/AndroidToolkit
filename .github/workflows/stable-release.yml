name: Stable Release

on:
  push:
    tags:
      - 'v*.*.*-stable'
  workflow_dispatch:

jobs:
  create-stable-release:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    outputs:
      app_version: ${{ steps.meta.outputs.app_version }}
      stable_tag: ${{ steps.meta.outputs.stable_tag }}
      release_id: ${{ steps.release.outputs.release_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute stable release metadata
        id: meta
        shell: bash
        run: |
          APP_VERSION="$(node -p "require('./package.json').version")"
          STABLE_TAG="${GITHUB_REF_NAME:-v${APP_VERSION}-stable}"

          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "stable_tag=$STABLE_TAG" >> "$GITHUB_OUTPUT"

      - name: Create stable release with custom notes
        id: release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const tag = '${{ steps.meta.outputs.stable_tag }}'
            const version = '${{ steps.meta.outputs.app_version }}'
            const shortSha = context.sha.slice(0, 7)
            const publishedAt = new Date().toISOString().replace('T', ' ').replace(/\.\d{3}Z$/, ' UTC')

            let previousStableTag = null
            try {
              const releases = await github.paginate(github.rest.repos.listReleases, {
                owner,
                repo,
                per_page: 100,
              })
              const priorStable = releases.find(release =>
                !release.draft &&
                !release.prerelease &&
                /-stable$/i.test(release.tag_name || '') &&
                release.tag_name !== tag
              )
              previousStableTag = priorStable?.tag_name || null
            } catch (error) {
              core.warning(`Unable to look up prior stable release: ${error.message}`)
            }

            let commits = []
            let compareUrl = null
            if (previousStableTag) {
              try {
                const compare = await github.rest.repos.compareCommits({
                  owner,
                  repo,
                  base: previousStableTag,
                  head: context.sha,
                })
                compareUrl = compare.data.html_url || null
                commits = (compare.data.commits || []).slice(-25)
              } catch (error) {
                core.warning(`Unable to compare commits for stable notes: ${error.message}`)
              }
            }

            const commitLines = commits
              .map(commit => {
                const summary = (commit.commit?.message || '').split('\n')[0].trim()
                return summary ? `- ${summary} (${commit.sha.slice(0, 7)})` : null
              })
              .filter(Boolean)

            const body = [
              `## Android Toolkit v${version} stable`,
              '',
              'Stable release built automatically from GitHub Actions.',
              '',
              '### Build Info',
              '',
              `- Tag: \`${tag}\``,
              '- Channel: `stable`',
              `- Commit: \`${shortSha}\``,
              `- Built: ${publishedAt}`,
              previousStableTag ? `- Previous stable: \`${previousStableTag}\`` : null,
              compareUrl ? `- Full changelog: ${compareUrl}` : null,
              '',
              '### What Changed Since The Last Stable',
              '',
              ...(commitLines.length > 0
                ? commitLines
                : ['- Stable release published, but commit summaries could not be generated for this run.']),
              '',
              '### Install Notes',
              '',
              '- macOS: open the `.dmg` and drag `Android Toolkit.app` into `Applications`.',
              '- Windows: use the `.exe` installer or `.msi` package.',
              '- Linux: install the native package for your distro when available. Debian-based systems can install the `.deb` with `sudo apt install ./Android-Toolkit_<version>_amd64.deb`.',
              '',
              '### Download Links',
              '',
              `- Stable releases: https://github.com/${owner}/${repo}/releases/latest`,
              `- All releases: https://github.com/${owner}/${repo}/releases`,
            ].filter(Boolean).join('\n')

            const release = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              target_commitish: context.sha,
              name: `v${version} stable`,
              body,
              draft: false,
              prerelease: false,
            })

            core.setOutput('release_id', String(release.data.id))

  publish-tauri:
    needs: create-stable-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build and publish stable release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-stable-release.outputs.release_id }}
          tagName: ${{ needs.create-stable-release.outputs.stable_tag }}
          args: ${{ matrix.args }}

name: Nightly Build

on:
  push:
    branches:
      - nightly
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact_name: linux-bundles
          - os: windows-latest
            platform: windows
            artifact_name: windows-bundles
          - os: macos-latest
            platform: macos
            artifact_name: macos-bundles

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build nightly bundles
        run: ${{ matrix.platform == 'linux' && 'npm run build:linux' || 'npm run tauri build' }}

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all nightly artifacts
        uses: actions/download-artifact@v4
        with:
          path: nightly-artifacts

      - name: Create nightly metadata
        id: meta
        run: |
          DATE_TAG="$(date -u +'%Y%m%d-%H%M%S')"
          echo "tag=nightly-${DATE_TAG}" >> "$GITHUB_OUTPUT"
          echo "name=Nightly ${DATE_TAG} UTC" >> "$GITHUB_OUTPUT"

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: true
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
          files: nightly-artifacts/**/*

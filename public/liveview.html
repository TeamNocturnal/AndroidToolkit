<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTK Live View</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0b0b0f;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #header {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }
    #status {
      padding: 8px 14px;
      color: rgba(255,255,255,.7);
      font-size: 12px;
      flex-shrink: 0;
    }
    #frame-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      overflow: hidden;
    }
    #frame {
      max-width: 100%;
      max-height: 100%;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.12);
      background: #111;
      object-fit: contain;
      display: none;
    }
    #placeholder {
      color: rgba(255,255,255,.3);
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="header">NTK Live View</div>
  <div id="status">Waiting for stream…</div>
  <div id="frame-wrap">
    <div id="placeholder">Start the stream in the main window to see it here.</div>
    <img id="frame" alt="Device live view" />
  </div>
  <script>
    const statusEl = document.getElementById('status')
    const frameEl = document.getElementById('frame')
    const placeholderEl = document.getElementById('placeholder')

    function onFrame(b64, status) {
      if (b64) {
        frameEl.src = 'data:image/png;base64,' + b64
        frameEl.style.display = ''
        placeholderEl.style.display = 'none'
      }
      if (status) statusEl.textContent = status
    }

    window.__TAURI__.event.listen('ntk-live-frame', function(event) {
      var payload = event.payload || {}
      onFrame(payload.b64, payload.status)
    })
  </script>
</body>
</html>
